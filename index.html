<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>szefitek</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Inter",sans-serif;
background:#050505 url("https://i.pinimg.com/originals/cf/84/d2/cf84d2be8fa65fd93767553d30a4f1a1.gif") center/cover no-repeat fixed;
color:#f5f5f5;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
cursor:url("URL_CURSOR"),auto;
overflow:hidden
}
@keyframes slideIn{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}
.page-wrap{
width:100%;
max-width:900px;
padding:24px 14px;
animation:slideIn .9s ease-out forwards
}
.profile-card{
background:#0b0b0b;
border-radius:18px;
border:1px solid #1c1c1c;
padding:20px 22px;
display:grid;
grid-template-columns:minmax(0,1.1fr)minmax(0,1.1fr);
gap:20px
}
.profile-left{display:flex;flex-direction:column;gap:14px}
.profile-header{display:flex;gap:14px;align-items:center}
.avatar{
width:72px;
height:72px;
border-radius:18px;
background:url("https://i.pinimg.com/originals/6b/9d/67/6b9d679e45756ca074f3b7f3f1632b70.gif")center/cover no-repeat;
border:1px solid #2a2a2a
}
.name-block{display:flex;flex-direction:column;gap:4px}
.username{font-size:22px;font-weight:700}
.subtitle{font-size:13px;color:#a0a0a0}
.badges-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.badge{
padding:3px 9px;
border-radius:999px;
font-size:11px;
text-transform:uppercase;
letter-spacing:.06em;
border:1px solid #2f2f2f;
background:#111;
color:#d0d0d0
}
.bio-box{
padding:10px 11px;
border-radius:10px;
background:#101010;
border:1px solid #1f1f1f;
font-size:13px;
color:#c8c8c8
}
.activity-box{
padding:9px 11px;
border-radius:10px;
background:#0d0d0d;
border:1px solid #1f1f1f;
display:flex;
gap:9px;
align-items:center;
font-size:12px
}
.activity-icon{
width:24px;
height:24px;
border-radius:6px;
background:#0078d4
}
.profile-right{display:flex;flex-direction:column;gap:12px}
.links-grid{display:grid;grid-template-columns:1fr;gap:8px}
.link-btn{
display:flex;
align-items:center;
gap:9px;
padding:9px 11px;
border-radius:10px;
text-decoration:none;
color:#f5f5f5;
font-size:13px;
background:#101010;
border:1px solid #1f1f1f;
transition:.15s ease
}
.link-btn:hover{background:#141414;transform:translateX(4px)}
.link-icon{
width:20px;
height:20px;
border-radius:4px;
background-size:cover;
background-position:center
}
.icon-discord{
background-image:url("https://i.pinimg.com/736x/fc/ea/9d/fcea9d73a542f8a88907ba603ebdc379.jpg")
}
.icon-github{
background-image:url("https://i.pinimg.com/736x/a8/a7/0c/a8a70c7fd8f7d221f914e6e4be4faf2b.jpg")
}
.icon-tiktok{
background-image:url("https://i.pinimg.com/736x/87/ba/b7/87bab7ac04b70d71049adb66712f7cd7.jpg")
}
.icon-website{
background-image:url("URL_ICON_WEBSITE")
}
.link-main{display:flex;flex-direction:column;gap:1px}
.link-title{font-weight:600}
.link-sub{font-size:11px;color:#a0a0a0}
.bottom-row{display:flex;justify-content:space-between;align-items:center}
.mini-icons{display:flex;gap:6px}
.mini-icon{
width:22px;
height:22px;
border-radius:999px;
display:flex;
align-items:center;
justify-content:center;
background:#101010;
border:1px solid #1f1f1f;
font-size:13px
}
.made-by{font-size:11px;color:#8a8a8a}
@media(max-width:780px){.profile-card{grid-template-columns:1fr}}
</style>
</head>
<body>

</body>
